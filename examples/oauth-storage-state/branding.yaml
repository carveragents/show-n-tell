# Replace with your brand. See templates/branding.example.yaml for all fields.

brand:
  name: "Your Brand"
  tagline: "Your tagline"
  cta:
    text: "Try it free"
    url: "https://your-site.example.com"

logo:
  path: "./logo.png"   # drop a logo.png next to this file

colors:
  ink: "#101828"
  ink_deep: "#0c1322"
  accent: "#bae424"
  cream: "#fbf7f3"

voice:
  provider: openai
  model: "gpt-4o-mini-tts"
  voice: cedar
  tone: "explanatory"
  instructions: |
    Read calmly and clearly, like a confident product walkthrough narrator.
    Pace around 140 words per minute.

recording_css: ""

# Optional: background music under narration. Pick ONE of the two modes.
#
# audio:
#   # Mode A — your own file:
#   bg_music_path: "./_assets/my_track.mp3"
#   # OR Mode B — bundled mood (upbeat / warm / calm / playful / cinematic / tech):
#   bg_music_mood: "warm"
#   bg_music_volume: 0.4
